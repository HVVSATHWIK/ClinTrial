name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v

      - name: Validator smoke check
        run: |
          python inference.py --agent baseline --seed 7 > inference.log
          python - <<'PY'
          import re
          import sys
          from pathlib import Path

          lines = Path("inference.log").read_text(encoding="utf-8").splitlines()
          end_lines = [line for line in lines if line.startswith("[END]")]

          if len(end_lines) != 3:
              print(f"Expected 3 END lines, found {len(end_lines)}")
              sys.exit(1)

          scores = []
          for line in end_lines:
              match = re.search(r"score=([0-9]*\.?[0-9]+)", line)
              if not match:
                  print(f"Missing score in END line: {line}")
                  sys.exit(1)
              score = float(match.group(1))
              scores.append(score)
              if not (0.0 < score < 1.0):
                  print(f"Out-of-range score {score} in line: {line}")
                  sys.exit(1)

          print(f"Validator smoke check passed. scores={scores}")
          PY
